<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Auth UI</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <main class="container">
      <section class="card" id="auth-card">
        <h1>Mini Auth UI</h1>
        <p>使用 JWT 與後端 API 進行登入與授權測試</p>

        <!-- Tab Navigation -->
        <div class="tabs">
          <button id="login-tab" class="tab active">登入</button>
          <button id="register-tab" class="tab">註冊</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="form active">
          <label>
            Username
            <input type="text" id="login-username" autocomplete="username" required />
          </label>
          <label>
            Password
            <input type="password" id="login-password" autocomplete="current-password" required />
          </label>
          <button type="submit" id="login-submit-btn">
            <span class="btn-text">登入</span>
            <span class="btn-loading" style="display: none;">載入中...</span>
          </button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="form">
          <label>
            Username
            <input type="text" id="register-username" autocomplete="username" required />
          </label>
          <label>
            Password
            <input type="password" id="register-password" autocomplete="new-password" required />
            <div id="password-strength" class="password-strength"></div>
          </label>
          <button type="submit" id="register-submit-btn">
            <span class="btn-text">註冊</span>
            <span class="btn-loading" style="display: none;">載入中...</span>
          </button>
        </form>

        <div class="actions">
          <button id="profile-btn" disabled>取得個人資料</button>
          <button id="data-btn" disabled>取得受保護資料</button>
          <button id="logout-btn" disabled>登出</button>
        </div>

        <div id="status" class="status">狀態訊息會顯示在這裡</div>
        <pre id="result" class="result"></pre>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
